name: phylogpn-replication
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip
  # PyTorch: pip으로 설치 (CUDA 라이브러리 번들, 시스템 CUDA 모듈 불필요)
  # bioinformatics
  - bioconda::cyvcf2
  - bioconda::pyfaidx
  - bioconda::pyliftover
  # data
  - pandas
  - pyarrow
  - openpyxl
  - tqdm
  # stats / plotting
  - scikit-learn
  - matplotlib
  - seaborn
  - jupyterlab
  - ipykernel
  - pip:
    # HuggingFace
    - torch==2.1.2+cu121 --index-url https://download.pytorch.org/whl/cu121
    - torchvision==0.16.2+cu121 --index-url https://download.pytorch.org/whl/cu121
    - transformers>=4.38.0,<4.40.0
    - datasets>=2.18.0
    - huggingface-hub
    - accelerate
    # GPN package (song lab)
    - git+https://github.com/songlab-cal/gpn.git
    # Caduceus: trust_remote_code=True로 HuggingFace에서 직접 로드, 별도 설치 불필요
